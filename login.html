<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Sign In - 中国签证申请服务中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'visa-blue': '#0756ad',
            'visa-navy': '#07316c',
            'visa-gold': '#f2b900',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="site-common.css?v=mock-auth-20260724">
  <style>
    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }
    .login-bg {
      background: linear-gradient(135deg, rgba(7,53,108,0.82) 0%, rgba(7,86,173,0.72) 100%),
                  url("images/v4-hero.png") center/cover no-repeat;
    }
    .login-card {
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(7,53,108,0.25);
    }
    .input-icon { color: #0756ad; }
    .btn-primary { background: #0756ad; }
    .btn-primary:hover { background: #07316c; }
    .input-divider { background: #d1d5db; }
  </style>
</head>
<body class="font-sans antialiased text-slate-900">
<header></header>
<div class="main-height flex w-full">
  <main class="login-bg relative min-w-0 flex-1 flex flex-col">

    <!-- 登录卡片居中区 -->
    <div class="flex flex-1 items-center justify-center px-4 py-10">
      <div class="login-card w-full max-w-[420px] overflow-hidden bg-white">
        <!-- 标题栏（藏青 flat + 金色下边线，与站内头部呼应） -->
        <div class="border-b-2 border-visa-gold bg-visa-navy px-6 py-4 text-center">
          <h1 class="text-xl font-semibold text-white">Account Sign In</h1>
        </div>

        <!-- 表单区 -->
        <form id="login-form" class="px-8 pb-9 pt-8">
          <!-- Email -->
          <div class="relative flex items-center overflow-hidden rounded border border-slate-300 bg-slate-50 transition-colors focus-within:border-visa-blue focus-within:ring-1 focus-within:ring-visa-blue">
            <span class="input-icon flex h-12 w-12 shrink-0 items-center justify-center">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="6" width="18" height="12" rx="2"></rect>
                <path stroke-linecap="round" d="M3 8l8.8 5.6a2 2 0 0 0 2.4 0L21 8"></path>
              </svg>
            </span>
            <span class="input-divider h-6 w-px"></span>
            <input type="email" id="email" name="email" placeholder="Email" autocomplete="email"
              class="h-12 w-full bg-transparent px-3 text-sm text-slate-800 outline-none placeholder:text-slate-400" required />
          </div>

          <!-- Password -->
          <div class="relative mt-5 flex items-center overflow-hidden rounded border border-slate-300 bg-slate-50 transition-colors focus-within:border-visa-blue focus-within:ring-1 focus-within:ring-visa-blue">
            <span class="input-icon flex h-12 w-12 shrink-0 items-center justify-center">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                <path stroke-linecap="round" d="M8 11V7a4 4 0 0 1 8 0v4"></path>
                <circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none"></circle>
              </svg>
            </span>
            <span class="input-divider h-6 w-px"></span>
            <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password"
              class="h-12 w-full bg-transparent px-3 text-sm text-slate-800 outline-none placeholder:text-slate-400" required />
            <button type="button" id="toggle-password"
              class="flex h-12 w-12 shrink-0 items-center justify-center text-slate-400 hover:text-visa-blue focus:outline-none"
              aria-label="显示密码" title="显示密码">
              <svg id="eye-open" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="eye-closed" class="hidden h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" d="M17.94 17.94A10.05 10.05 0 0 1 12 19c-6 0-10-7-10-7a19.34 19.34 0 0 1 3.14-4.7m2.91-2.17A9.9 9.9 0 0 1 12 5c6 0 10 7 10 7a19.3 19.3 0 0 1-2.5 3.65"></path>
                <path stroke-linecap="round" d="M3 21L21 3"></path>
              </svg>
            </button>
          </div>

          <!-- Sign In -->
          <button type="submit" class="btn-primary mt-6 h-12 w-full rounded text-base font-semibold text-white transition-colors">
            Sign In
          </button>
          <p id="login-status" class="mt-3 min-h-5 text-center text-sm font-medium text-visa-blue" aria-live="polite"></p>

          <!-- Links -->
          <div class="mt-5 flex items-center justify-between text-sm">
            <a href="#" class="text-visa-blue hover:text-visa-navy hover:underline">Forgot Password?</a>
            <a href="register.html" class="text-visa-blue hover:text-visa-navy hover:underline">No account? Create now.</a>
          </div>
        </form>
      </div>
    </div>

  </main>
</div>

<script src="shared-layout.js?v=mock-auth-20260724" defer></script>
<script>
  (function () {
    const pwd = document.getElementById('password');
    const toggle = document.getElementById('toggle-password');
    const eyeOpen = document.getElementById('eye-open');
    const eyeClosed = document.getElementById('eye-closed');

    toggle.addEventListener('click', function () {
      const isHidden = pwd.type === 'password';
      pwd.type = isHidden ? 'text' : 'password';
      eyeOpen.classList.toggle('hidden');
      eyeClosed.classList.toggle('hidden');
    });

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const status = document.getElementById('login-status');
      const email = document.getElementById('email').value.trim();
      try {
        localStorage.setItem('cvasc-demo-auth', JSON.stringify({
          loggedIn: true,
          email: email
        }));
      } catch (error) {
        status.textContent = '浏览器未允许保存模拟登录状态。';
        return;
      }
      status.textContent = '登录成功，正在返回首页…';
      setTimeout(function () {
        window.location.href = 'index-V4.html';
      }, 350);
    });
  })();
</script>
</body></html>
